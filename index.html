<!DOCTYPE html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Spots - Profile</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
			rel="stylesheet" />
		<script src="https://cdn.tailwindcss.com"></script>
		<script
			src="https://kit.fontawesome.com/99417561c3.js"
			crossorigin="anonymous"></script>
		<link rel="stylesheet" href="index.css" />
	</head>
	<body class="bg-[#f7f2ea] min-h-screen flex flex-col items-center font-sans">
		<!-- Header (ugomma)-->
      <header class="header flex items-center justify-center bg-white gap-x-2 w-full py-2">
         <div class="logo"><img src="./assets/Group 13.png" alt="logo"></div>
         <h1>SPOTS</h1>
  
    </header>
  
		<!-- Profile Section  (sirjaey)-->
    <section id="sirjaey" class=" flex flex-col md:flex-row items-center  justify-center  w-full ">
			<div class="profile mt-10 flex flex-col md:flex-row items-center justify-center md:items-start md:justify-between   ">
				<div class="avatar ">
					<img src="./assets/image 2.svg" alt="profile image"  class="rounded-lg"/>
				</div>
				<div class="bio-data flex flex-col  gap-y-3">
					<div class="about">
						<h1>Bessie Coleman</h1>
						<p class=" text-center md:text-start">Civil Aviator</p>
					</div>
					<div class="edit mt-6 md:mt-16  text-center md:text-start"> 
						<span>
              <i class="fa-solid fa-pen" style="margin-right: 10px"></i>
              Edit Profile
              </span
						>
					</div>
				</div>
			</div>
			<div class="  mt-5  w-full md:w-fit md:mt-36 ">
				<div class="new-post-btn flex items-center justify-center md:justify-end ">
					<button class="w-full ">
						<i class="fa-solid fa-plus"></i> New
						Post
					</button>
				</div>
			</div>
		</section>
		 <!-- Gallery (horpsy, njoku & abuchi)-->
      
    <section class="gallery-one-section py-8">
      <!-- Receives Gallery imageges here from JavaScript (SirJAey)-->
    </section>

		<!-- Footer (tabeit)-->
    <footer class="footer mt-5">
      <p class="text-center py-16"> 2023 © Spots </p>
    </footer>
    

<!-- Modal Backdrop -->
<div id="modalBackdrop" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
  <!-- Upload Form (Modal Content) -->
  <form
    id="uploadForm"
    class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md space-y-4"
    action="/upload"
    method="post"
    enctype="multipart/form-data"
  >
    <h2 class="text-2xl font-semibold text-center text-gray-700">Upload Image</h2>

    <div class="form-group">
      <label for="imageName" class="block mb-1 font-bold text-gray-700">Image Name</label>
      <input
        type="text"
        id="imageName"
        name="imageName"
        placeholder="Enter image name"
        required
        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400"
      />
    </div>

    <div class="form-group">
      <label for="imageFile" class="block mb-1 font-bold text-gray-700">Select Image</label>
      <input
        type="file"
        id="imageFile"
        name="imageFile"
        accept="image/*"
        required
        class="w-full px-3 py-2 border border-gray-300 rounded-md file:mr-4 file:py-2 file:px-4 file:border-0 file:text-sm file:font-semibold file:bg-green-100 file:text-green-700 hover:file:bg-green-200"
      />
    </div>

    <button
      type="submit"
      id="form-submit-btn"
      class="w-full py-3 bg-green-600 text-white text-lg rounded-xl hover:bg-green-700 transition"
    >
      Submit
    </button>
  </form>
</div>




    <script src="script.js"></script>
	</body>
</html>
