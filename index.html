<!DOCTYPE html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Spots - Profile</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
			rel="stylesheet" />
		<script src="https://cdn.tailwindcss.com"></script>
		
		<script
			src="https://kit.fontawesome.com/99417561c3.js"
			crossorigin="anonymous"></script>
		<link rel="stylesheet" href="index.css" />
	</head>
	<body class="bg-[#f7f2ea] min-h-screen flex flex-col items-center font-sans">
		<!-- Header (ugomma)-->
      <header class="header flex items-center justify-center bg-white gap-x-2 w-full py-2">
         <div class="logo"><img src="./assets/Group 13.png" alt="logo"></div>
         <h1>SPOTS</h1>
  
    </header>
  
		<!-- Profile Section  (sirjaey)-->
    <section id="sirjaey" class=" flex flex-col md:flex-row items-center  justify-center  w-full ">
			<div class="profile mt-10 flex flex-col md:flex-row items-center justify-center md:items-start md:justify-between   ">
				<div class="avatar ">
					<img src="./assets/image 2.svg" alt="profile image"  class="rounded-lg w-[190px] h-[190px]"/>
				</div>
				<div class="bio-data flex flex-col  gap-y-3">
					<div class="about">
						<h1>Bessie Coleman</h1>
						<p class=" text-center md:text-start">Civil Aviator</p>
						<p class=" text-center md:text-start " id="profile-bio">Bessie Coleman was the first African American</p>
					</div>
					<div class="edit mt-6 md:mt-16 cursor-pointer  text-center md:text-start"> 
						<span>
              <i class="fa-solid fa-pen edit span " style="margin-right: 10px"></i>
              Edit Profile
              </span
						>
					</div>
				</div>
			</div>
			<div class="  mt-5  w-full md:w-fit md:mt-36 ">
				<div class="new-post-btn flex items-center justify-center md:justify-end ">
					<button class="w-full ">
						<i class="fa-solid fa-plus"></i> New
						Post
					</button>
				</div>
			</div>
		</section>
		 <!-- Gallery (horpsy, njoku & abuchi)-->
      
    <section class="gallery-one-section py-8">
      <!-- Receives Gallery imageges here from JavaScript (SirJAey)-->
    </section>

		<!-- Footer (tabeit)-->
    <footer class="footer mt-5">
      <p class="text-center py-16"> 2023 © Spots </p>
    </footer>

	  <!-- Modals -->

 <!-- Modal for Editing Profile -->

 <section id="editProfileModal" class="modal hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
	<form
	  id="editProfileForm"
	  class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md space-y-4"
	  enctype="multipart/form-data"
	>
	  <h2 class="text-xl font-semibold text-gray-800 text-center">Edit Profile</h2>
  
	  <div class="space-y-2">
		<label class="block text-sm font-medium text-gray-700">Full Name:</label>
		<input
		  type="text"
		  id="editName"
		  name="name"
		  required
		  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
		/>
	  </div>
  
	  <div class="space-y-2">
		<label class="block text-sm font-medium text-gray-700">Job Title:</label>
		<input
		  type="text"
		  id="editOccupation"
		  name="job"
		  required
		  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
		/>
	  </div>
  
	  <div class="space-y-2">
		<label class="block text-sm font-medium text-gray-700">Bio:</label>
		<textarea
		  id="editBio"
		  name="bio"
		  rows="3"
		  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
		></textarea>
	  </div>
  
	  <div class="space-y-2">
		<label class="block text-sm font-medium text-gray-700">Upload Image:</label>
		<input
		  type="file"
		  id="imageUpload"
		  accept="image/*"
		  class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4
				 file:rounded-full file:border-0
				 file:text-sm file:font-semibold
				 file:bg-blue-50 file:text-blue-700
				 hover:file:bg-blue-100"
		/>
		<div id="imagePreviewContainer" class="mt-2">
		  <img
			id="imagePreview"
			src=""
			alt="Image Preview"
			class="hidden w-24 h-24 rounded-full object-cover border border-gray-300"
		  />
		</div>
	  </div>
  
	  <div class="flex justify-between pt-4">
		<button
		  id="save-btn"
		  type="submit"
		  class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg"
		>
		  Save
		</button>
		<button
		  type="button"
		  id="cancel-btn"
		  class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-2 px-4 rounded-lg"
		>
		  Cancel
		</button>
	  </div>
	</form>
  </section>

	<script type="module" src="./scripts/index.js"></script>
	</body>
</html>
